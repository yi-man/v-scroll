name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun i

      - name: Run Project Build Pipeline
        run: ./build.sh
